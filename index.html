<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Translate .srt subtitle files between any language pair — fast, in your browser, nothing uploaded." />
    <meta name="theme-color" content="#1c1c20" />
    <title>Subtitle Translator</title>
    <script>
      // Set theme before paint to avoid a flash
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <script type="module" crossorigin src="/Universal-Subtitle-Translator/assets/index-BypvmeFD.js"></script>
    <link rel="stylesheet" crossorigin href="/Universal-Subtitle-Translator/assets/index-CA_EEgWA.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
