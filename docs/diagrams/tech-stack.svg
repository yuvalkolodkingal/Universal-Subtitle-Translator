<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="techStackTitle techStackDesc">
  <title id="techStackTitle">Universal Subtitle Translator Tech Stack</title>
  <desc id="techStackDesc">Architecture diagram showing browser client, frontend stack, application core, external translation API, and CI deployment pipeline.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#18181b" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#71717a"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#b8860b"/>
    </marker>
    <style>
      .title { font: 700 24px Inter, ui-sans-serif, system-ui, sans-serif; fill: #18181b; }
      .subtitle { font: 400 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #71717a; }
      .layerTitle { font: 600 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #27272a; }
      .chip { font: 500 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #27272a; }
      .chipMuted { font: 400 11px Inter, ui-sans-serif, system-ui, sans-serif; fill: #52525b; }
      .edgeLabel { font: 500 11px Inter, ui-sans-serif, system-ui, sans-serif; fill: #52525b; }
      .legendLabel { font: 500 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #3f3f46; }
    </style>
  </defs>

  <rect width="960" height="720" rx="16" fill="url(#bgGrad)"/>

  <text x="40" y="44" class="title">Tech stack</text>
  <text x="40" y="68" class="subtitle">Client-side SPA with in-browser translation and GitHub Pages deployment</text>

  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="400" y="92" width="160" height="52" rx="12" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
    <circle cx="424" cy="118" r="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M414 132 C414 126 418 124 424 124 C430 124 434 126 434 132" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="446" y="123" class="chip">User</text>
  </g>

  <line x1="480" y1="144" x2="480" y2="168" stroke="#a1a1aa" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="492" y="160" class="edgeLabel">Drop .srt file</text>

  <!-- Client Browser -->
  <g filter="url(#shadow)">
    <rect x="60" y="176" width="840" height="96" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="84" y="204" class="layerTitle">Client browser</text>
    <rect x="84" y="218" width="170" height="36" rx="8" fill="#ffffff" stroke="#93c5fd"/>
    <text x="98" y="241" class="chip">React 18 SPA</text>
    <rect x="270" y="218" width="190" height="36" rx="8" fill="#ffffff" stroke="#93c5fd"/>
    <text x="284" y="241" class="chip">localStorage theme</text>
    <rect x="476" y="218" width="200" height="36" rx="8" fill="#ffffff" stroke="#93c5fd"/>
    <text x="490" y="241" class="chip">Zero server uploads</text>
    <rect x="692" y="218" width="184" height="36" rx="8" fill="#ffffff" stroke="#93c5fd"/>
    <text x="706" y="241" class="chip">SubRip .srt in memory</text>
  </g>

  <line x1="480" y1="272" x2="480" y2="296" stroke="#a1a1aa" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Frontend Stack -->
  <g filter="url(#shadow)">
    <rect x="60" y="304" width="840" height="112" rx="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="84" y="332" class="layerTitle">Frontend stack</text>
    <rect x="84" y="346" width="118" height="36" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="98" y="369" class="chip">TypeScript 5.2</text>
    <rect x="214" y="346" width="96" height="36" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="228" y="369" class="chip">Vite 5</text>
    <rect x="322" y="346" width="132" height="36" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="336" y="369" class="chip">Tailwind CSS 3</text>
    <rect x="466" y="346" width="148" height="36" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="480" y="369" class="chip">OKLCH tokens</text>
    <rect x="626" y="346" width="118" height="36" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="640" y="369" class="chip">Inter font</text>
    <rect x="756" y="346" width="120" height="36" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="770" y="369" class="chip">lucide-react</text>
  </g>

  <line x1="480" y1="416" x2="480" y2="440" stroke="#a1a1aa" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Application Core -->
  <g filter="url(#shadow)">
    <rect x="60" y="448" width="840" height="112" rx="14" fill="#fef9ee" stroke="#c9932e" stroke-width="2"/>
    <text x="84" y="476" class="layerTitle">Application core</text>
    <rect x="84" y="490" width="170" height="36" rx="8" fill="#ffffff" stroke="#e8c872"/>
    <text x="98" y="513" class="chip">srtParser.ts</text>
    <rect x="266" y="490" width="170" height="36" rx="8" fill="#ffffff" stroke="#e8c872"/>
    <text x="280" y="513" class="chip">translator.ts</text>
    <rect x="448" y="490" width="118" height="36" rx="8" fill="#ffffff" stroke="#e8c872"/>
    <text x="462" y="513" class="chip">rtl.ts</text>
    <rect x="578" y="490" width="298" height="36" rx="8" fill="#fff7ed" stroke="#c9932e"/>
    <text x="592" y="505" class="chip">Worker pool</text>
    <text x="592" y="520" class="chipMuted">2 concurrent batches, 1500 char chunks, [xyz999] delimiter</text>
  </g>

  <!-- Arrows from app core -->
  <path d="M 330 560 L 330 596 L 210 596" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="588" class="edgeLabel">Batch translate</text>

  <path d="M 630 560 L 630 596 L 750 596" fill="none" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="652" y="588" class="edgeLabel">Build output</text>

  <!-- External API -->
  <g filter="url(#shadow)">
    <rect x="60" y="608" width="360" height="72" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
    <text x="84" y="636" class="layerTitle">External API</text>
    <text x="84" y="660" class="chip">Google Translate free endpoint</text>
  </g>

  <!-- CI and Hosting -->
  <g filter="url(#shadow)">
    <rect x="540" y="608" width="360" height="72" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="564" y="636" class="layerTitle">CI and hosting</text>
    <text x="564" y="660" class="chip">GitHub Actions ’ npm ci / build ’ gh-pages</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 692)">
    <rect x="0" y="-18" width="14" height="14" rx="3" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="22" y="-6" class="legendLabel">Runtime</text>
    <rect x="110" y="-18" width="14" height="14" rx="3" fill="#f5f3ff" stroke="#8b5cf6"/>
    <text x="132" y="-6" class="legendLabel">Build and UI</text>
    <rect x="240" y="-18" width="14" height="14" rx="3" fill="#fef9ee" stroke="#c9932e"/>
    <text x="262" y="-6" class="legendLabel">App logic</text>
    <rect x="360" y="-18" width="14" height="14" rx="3" fill="#fff7ed" stroke="#ea580c"/>
    <text x="382" y="-6" class="legendLabel">External</text>
    <rect x="470" y="-18" width="14" height="14" rx="3" fill="#eef2ff" stroke="#6366f1"/>
    <text x="492" y="-6" class="legendLabel">Deploy</text>
  </g>
</svg>
